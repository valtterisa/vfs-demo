services:
  vfs-app:
    build:
      context: .
      dockerfile: Dockerfile
    command: bun run start
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      PORT: 3000
      SQLITE_PATH: /data/vfs-demo.db
      DEFAULT_ROLE: admin
    volumes:
      - app_data:/data
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 8
    networks:
      - backend

volumes:
  app_data:

networks:
  backend:
    driver: bridge

